services:
  timescaledb:
    image: ${TIMESCALEDB_IMAGE:-timescale/timescaledb:2.13.1-pg15}
    container_name: ${TIMESCALEDB_CONTAINER_NAME:-timescaledb}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-mydatabase}
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
      # TimescaleDB tuning recommendation level: "promscale" | "oltp" | "dw" | ""
      - TS_TUNE_PROFILE=${TS_TUNE_PROFILE:-oltp}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${TIMESCALEDB_PORT:-5432}:5432"
    networks:
      - timescaledb_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  timescaledb_network:
    driver: bridge

volumes:
  timescaledb_data:
    driver: local
