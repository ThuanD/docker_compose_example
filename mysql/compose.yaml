services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.2.0}
    container_name: ${MYSQL_CONTAINER_NAME:-mysql}
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mydatabase}
      - MYSQL_USER=${MYSQL_USER:-myuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mypassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_config:/etc/mysql/conf.d
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./config/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./logs:/var/log/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - mysql_network
    command: >
      mysqld
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --log-error=/var/log/mysql/error.log
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long_query_time=2
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE:-phpmyadmin:5.2.1}
    container_name: ${PHPMYADMIN_CONTAINER_NAME:-phpmyadmin}
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${MYSQL_USER:-myuser}
      - PMA_PASSWORD=${MYSQL_PASSWORD:-mypassword}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - PMA_ARBITRARY=${PMA_ARBITRARY:-0}
      - UPLOAD_LIMIT=${UPLOAD_LIMIT:-256M}
      - MEMORY_LIMIT=${MEMORY_LIMIT:-512M}
    volumes:
      - phpmyadmin_data:/var/lib/phpmyadmin
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    networks:
      - mysql_network
      - public_network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  mysql-backup:
    image: ${MYSQL_IMAGE:-mysql:8.2.0}
    container_name: ${MYSQL_BACKUP_CONTAINER_NAME:-mysql-backup}
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-mydatabase}
      - MYSQL_USER=${MYSQL_USER:-myuser}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mypassword}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    networks:
      - mysql_network
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        trap exit TERM
        while :; do
          /scripts/backup.sh || echo "backup failed at $$(date)"
          find /backups -maxdepth 1 -name 'mysql_backup_*.sql.gz' -type f -mtime +$${BACKUP_RETENTION_DAYS} -delete 2>/dev/null || true
          sleep $${BACKUP_INTERVAL_SECONDS} &
          wait $$!
        done
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

networks:
  mysql_network:
    driver: bridge
    internal: true
  public_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  mysql_config:
    driver: local
  phpmyadmin_data:
    driver: local
