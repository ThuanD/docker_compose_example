x-celery-common: &celery-common
  build:
    context: ./app
  image: ${CELERY_APP_IMAGE:-celery-example-app:latest}
  environment:
    - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
    - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    - PYTHONUNBUFFERED=1
  volumes:
    - ./app:/app:ro
  networks:
    - celery_network
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  redis:
    image: ${REDIS_IMAGE:-redis:7.2-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-celery-redis}
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    networks:
      - celery_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  worker:
    <<: *celery-common
    container_name: ${CELERY_WORKER_CONTAINER_NAME:-celery-worker}
    command: celery -A tasks worker --loglevel=${CELERY_LOG_LEVEL:-INFO} --concurrency=${CELERY_CONCURRENCY:-4}
    deploy:
      replicas: ${CELERY_WORKER_REPLICAS:-2}
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  beat:
    <<: *celery-common
    container_name: ${CELERY_BEAT_CONTAINER_NAME:-celery-beat}
    command: celery -A tasks beat --loglevel=${CELERY_LOG_LEVEL:-INFO} --schedule=/tmp/celerybeat-schedule
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    # Beat is a singleton scheduler - do not scale past 1 or jobs will duplicate
    # A healthcheck on beat is non-trivial; rely on restart policy + Flower UI

  flower:
    <<: *celery-common
    container_name: ${CELERY_FLOWER_CONTAINER_NAME:-celery-flower}
    command: celery -A tasks flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    networks:
      - celery_network
      - public_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5555 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  celery_network:
    driver: bridge
    internal: true
  public_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
