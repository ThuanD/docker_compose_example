services:
  vault:
    image: ${VAULT_IMAGE:-hashicorp/vault:1.15}
    container_name: ${VAULT_CONTAINER_NAME:-vault}
    # cap_add IPC_LOCK allows Vault to mlock memory (prevents secrets from being swapped to disk)
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_ADDR=http://0.0.0.0:8200
      - VAULT_API_ADDR=http://0.0.0.0:8200
      - VAULT_LOG_LEVEL=${VAULT_LOG_LEVEL:-info}
    volumes:
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    ports:
      - "${VAULT_PORT:-8200}:8200"
    networks:
      - vault_network
    command: server -config=/vault/config/vault.hcl
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    restart: unless-stopped
    healthcheck:
      # 200 = initialized+unsealed, 429 = standby, 472 = DR standby, 501 = not initialized, 503 = sealed
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8200/v1/sys/health?standbyok=true || [ $$? -eq 8 ]"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  vault_network:
    driver: bridge

volumes:
  vault_data:
    driver: local
  vault_logs:
    driver: local
