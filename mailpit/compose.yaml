services:
  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:v1.14}
    container_name: ${MAILPIT_CONTAINER_NAME:-mailpit}
    environment:
      # Persist messages to disk (defaults to in-memory only)
      - MP_DATABASE=/data/mailpit.db
      - MP_MAX_MESSAGES=${MP_MAX_MESSAGES:-5000}
      - MP_SMTP_AUTH_ACCEPT_ANY=${MP_SMTP_AUTH_ACCEPT_ANY:-1}
      - MP_SMTP_AUTH_ALLOW_INSECURE=${MP_SMTP_AUTH_ALLOW_INSECURE:-1}
      # UI basic auth (user:bcrypt_hash) - generate with `htpasswd -bnBC 10 "" PASSWORD | tr -d ':\n'`
      - MP_UI_AUTH=${MP_UI_AUTH:-}
    volumes:
      - mailpit_data:/data
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - mailpit_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

networks:
  mailpit_network:
    driver: bridge

volumes:
  mailpit_data:
    driver: local
